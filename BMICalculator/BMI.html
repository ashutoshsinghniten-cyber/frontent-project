<html>
    <head>
        
        <title>BMI Calculator</title>
        <link rel="stylesheet" href="BMI.css"/>
        
    </head>
    <body>
        <nav id="upper_box">
            <a href="/" target="_blank" id="home">Home</a>
            <a href="/" target="_blank" id="login">Login</a>
        </nav>
        <div id="bdy">
            <h1 style="padding-top: 30px; padding-left: 20px;">BMI Calculator</h1>
            <form>
                <h3><label>Height in CM:</label><input type="text" class="input1" id="height"/></h3>
                <h3><label>Weight in KG:</label><input type="text" class="input1" id="Weight"/></h3>
                <button>Calculate</button>
                <div id="result"></div>
                <div id="weight_guide">
                    <h1>BMI Weight Guide</h1>
                    <p>Under Weight=Less than 18.6</p>
                    <p>Normal Weight=18.6 and 24.9</p>
                    <p>OverWeight=Greater than 24.9</p>
                </div>
            </form>
            
        </div>
    </body>
    <script src="BMI.js"></script>
</html>
